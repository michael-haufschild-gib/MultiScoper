name: Build and Test

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'screenshots/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  # Consistent hashes for dependency caching
  JUCE_VERSION: "8.0.12"
  HTTPLIB_VERSION: "v0.38.0"
  JSON_VERSION: "v3.12.0"
  GTEST_VERSION: "v1.17.0"

jobs:
  # ============================================================
  # LINT GATE — must pass before build starts
  # Fast checks: formatting, size limits, test quality
  # ============================================================
  lint:
    name: Lint Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: clang-format check
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
              echo "ERROR: $file has formatting issues"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find include src tests test_harness -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -not -path '*/build/*' -not -path '*/_deps/*' -print0 2>/dev/null)
          if [ $ERRORS -gt 0 ]; then
            echo "FAILED: $ERRORS file(s) have formatting issues. Run clang-format -i on them."
            exit 1
          fi
          echo "PASSED: all files formatted correctly."

      - name: Size lint (max file/function lines)
        run: |
          python3 scripts/size_lint.py \
            --root . \
            --paths include src tests test_harness \
            --max-file-lines 500 \
            --max-function-lines 60

      - name: Test quality lint (shallow test detection)
        run: |
          python3 scripts/test_quality_lint.py \
            --root . \
            --paths tests \
            --min-assertions 1

      - name: Source registry lint (orphan/missing files)
        run: python3 scripts/source_registry_lint.py --root .

      - name: TODO lint (placeholder detection)
        run: python3 scripts/todo_lint.py --root . --paths include src

      - name: Architecture lint (dependency boundaries)
        run: python3 scripts/architecture_lint.py --root . --paths include src

      - name: Comment lint (empty comments, missing doc comments)
        run: |
          python3 scripts/comment_lint.py \
            --root . \
            --paths include src tests test_harness \
            --doc-paths include

  build:
    name: ${{ matrix.name }}
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            cmake_preset: ci-macos
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_macOS.zip
            pluginval_exe: pluginval.app/Contents/MacOS/pluginval
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

          - name: Windows
            os: windows-latest
            cmake_preset: ci-windows
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Windows.zip
            pluginval_exe: pluginval.exe
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

          - name: Linux
            os: ubuntu-22.04
            cmake_preset: ci-linux
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip
            pluginval_exe: pluginval
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ============================================================
      # CACHING - Aggressive caching to minimize build times
      # ============================================================

      # Cache FetchContent dependencies (JUCE, httplib, json, googletest)
      # These rarely change and take significant time to download/configure
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/${{ matrix.cmake_preset }}/_deps
          key: fetchcontent-${{ matrix.name }}-${{ env.JUCE_VERSION }}-${{ env.HTTPLIB_VERSION }}-${{ env.JSON_VERSION }}-${{ env.GTEST_VERSION }}
          restore-keys: |
            fetchcontent-${{ matrix.name }}-

      # Cache CMake configuration (CMakeCache.txt, generated files)
      - name: Cache CMake configuration
        uses: actions/cache@v4
        with:
          path: |
            build/${{ matrix.cmake_preset }}/CMakeCache.txt
            build/${{ matrix.cmake_preset }}/CMakeFiles
          key: cmake-config-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            cmake-config-${{ matrix.name }}-

      # Cache pluginval download
      - name: Cache pluginval
        uses: actions/cache@v4
        with:
          path: |
            pluginval*
            ${{ matrix.pluginval_exe }}
          key: pluginval-${{ matrix.name }}-v1.0.4

      # ============================================================
      # INSTALL DEPENDENCIES
      # ============================================================

      # Install Ninja build system
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      # Setup MSVC environment for Windows (required for Ninja to use MSVC instead of MinGW)
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Setup ccache for faster rebuilds (aggressive settings)
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.name }}-${{ env.BUILD_TYPE }}-${{ github.ref_name }}
          restore-keys: |
            ${{ matrix.name }}-${{ env.BUILD_TYPE }}-${{ github.ref_name }}
            ${{ matrix.name }}-${{ env.BUILD_TYPE }}-main
            ${{ matrix.name }}-${{ env.BUILD_TYPE }}-
          max-size: 1G
          verbose: 2

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            xvfb

      # Configure CMake using presets
      - name: Configure CMake
        run: cmake --preset ${{ matrix.cmake_preset }}

      # Build using presets
      - name: Build
        run: cmake --build --preset ${{ matrix.cmake_preset }}

      # Run unit tests
      - name: Run Unit Tests
        run: ctest --preset ${{ matrix.cmake_preset }}

      # Download pluginval (skip if cached)
      - name: Download pluginval
        shell: bash
        run: |
          if [ ! -f "${{ matrix.pluginval_exe }}" ]; then
            echo "Downloading pluginval..."
            curl -LO ${{ matrix.pluginval_url }}
            unzip -o pluginval_*.zip
          else
            echo "Using cached pluginval"
          fi

      # Start virtual display for Linux (required for pluginval GUI tests)
      - name: Start Xvfb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo /usr/bin/Xvfb :99 -screen 0 1280x1024x24 &
          echo "XVFB_PID=$!" >> $GITHUB_ENV
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # Validate VST3 plugin with pluginval
      # Note: Using strictness level 5 on Linux due to XCB threading issues with
      # level 10's Editor Automation tests in headless CI environments
      - name: Validate VST3 with pluginval
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Linux: Use level 5 to avoid XCB threading assertion in Editor Automation
            ./${{ matrix.pluginval_exe }} --strictness-level 5 --verbose --validate "build/${{ matrix.cmake_preset }}/${{ matrix.plugin_path }}"
          else
            ./${{ matrix.pluginval_exe }} --strictness-level 10 --verbose --validate "build/${{ matrix.cmake_preset }}/${{ matrix.plugin_path }}"
          fi

      - name: Stop Xvfb (Linux)
        if: runner.os == 'Linux' && always()
        run: |
          if [ -n "$XVFB_PID" ]; then
            sudo kill "$XVFB_PID" 2>/dev/null || true
          fi

      # Upload build artifacts
      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-vst3-${{ matrix.name }}
          path: build/${{ matrix.cmake_preset }}/Oscil_artefacts/Release/VST3/
          if-no-files-found: error

      - name: Upload AU (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-au-${{ matrix.name }}
          path: build/${{ matrix.cmake_preset }}/Oscil_artefacts/Release/AU/
          if-no-files-found: error

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-standalone-${{ matrix.name }}
          path: build/${{ matrix.cmake_preset }}/Oscil_artefacts/Release/Standalone/
          if-no-files-found: error

  # Code Coverage job
  # Generates HTML coverage report using Clang source-based code coverage
  coverage:
    name: Code Coverage
    needs: [lint]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: coverage-${{ github.ref_name }}
          restore-keys: |
            coverage-${{ github.ref_name }}
            coverage-main
            coverage-
          max-size: 1G
          verbose: 2

      # Install Dependencies (Clang and Linux Audio Libs)
      - name: Install Dependencies
        run: |
          sudo apt-get install -y \
            clang \
            llvm \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure CMake (Coverage)
        run: |
          cmake --preset coverage \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build --preset coverage

      - name: Run Tests
        run: |
          export LLVM_PROFILE_FILE="coverage-%p.profraw"
          ctest --preset coverage

      - name: Generate Coverage Report
        run: |
          # Merge profile data
          llvm-profdata merge -sparse coverage-*.profraw -o coverage.profdata
          
          # Generate HTML report
          # We verify the executable path based on the preset binaryDir
          llvm-cov show ./build/coverage/OscilTests \
            -instr-profile=coverage.profdata \
            -format=html \
            -output-dir=coverage_report \
            -ignore-filename-regex="(_deps|JuceLibraryCode|tests/|test_harness/)" \
            -show-line-counts-or-regions \
            -Xdemangler=c++filt

          # Also generate a summary for the console
          llvm-cov report ./build/coverage/OscilTests \
            -instr-profile=coverage.profdata \
            -ignore-filename-regex="(_deps|JuceLibraryCode|tests/|test_harness/)"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report/
          if-no-files-found: error

  # RealtimeSanitizer job - detects real-time safety violations in audio code
  # Catches: allocations, mutex locks, blocking syscalls in processBlock()
  # Note: Requires LLVM's official Clang 20+ (Ubuntu's packaged Clang doesn't include RTSan)
  rtsan:
    name: RealtimeSanitizer
    needs: [lint]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache FetchContent dependencies for RTSan build
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: fetchcontent-rtsan-${{ env.JUCE_VERSION }}-${{ env.HTTPLIB_VERSION }}-${{ env.JSON_VERSION }}-${{ env.GTEST_VERSION }}
          restore-keys: |
            fetchcontent-rtsan-

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: rtsan-debug-${{ github.ref_name }}
          restore-keys: |
            rtsan-debug-${{ github.ref_name }}
            rtsan-debug-main
            rtsan-debug-
          max-size: 1G
          verbose: 2

      - name: Install LLVM 20 (with RTSan support)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-20 lld-20

      - name: Install JUCE dependencies
        run: |
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure CMake with RTSan
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-20 \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DOSCIL_ENABLE_RTSAN=ON \
            -DOSCIL_BUILD_TESTS=ON

      - name: Build with RTSan
        run: cmake --build build --target OscilTests --parallel

      - name: Run unit tests with RTSan
        run: ctest --test-dir build --build-config Debug --output-on-failure
        env:
          # RTSan will abort on first violation - we want to catch them
          RTSAN_OPTIONS: "halt_on_error=1"
