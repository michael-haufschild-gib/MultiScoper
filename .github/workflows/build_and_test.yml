name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            cmake_args: -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_macOS.zip
            pluginval_exe: pluginval.app/Contents/MacOS/pluginval
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

          - name: Windows
            os: windows-latest
            cmake_args: ""
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_Windows.zip
            pluginval_exe: pluginval.exe
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

          - name: Linux
            os: ubuntu-22.04
            cmake_args: ""
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_Linux.zip
            pluginval_exe: pluginval
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      # Configure CMake
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ${{ matrix.cmake_args }} -DOSCIL_BUILD_TESTS=ON

      # Build
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel ${{ env.CMAKE_BUILD_PARALLEL_LEVEL }}

      # Run unit tests
      - name: Run Unit Tests
        run: ctest --test-dir build --build-config ${{ env.BUILD_TYPE }} --output-on-failure --verbose

      # Download pluginval
      - name: Download pluginval
        shell: bash
        run: |
          curl -LO ${{ matrix.pluginval_url }}
          unzip pluginval_*.zip

      # Validate VST3 plugin with pluginval
      - name: Validate VST3 with pluginval
        shell: bash
        run: |
          ./${{ matrix.pluginval_exe }} --strictness-level 10 --verbose --validate "build/${{ matrix.plugin_path }}"

      # Upload build artifacts
      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-vst3-${{ matrix.name }}
          path: build/Oscil_artefacts/Release/VST3/
          if-no-files-found: error

      - name: Upload AU (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-au-${{ matrix.name }}
          path: build/Oscil_artefacts/Release/AU/
          if-no-files-found: error

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-standalone-${{ matrix.name }}
          path: build/Oscil_artefacts/Release/Standalone/
          if-no-files-found: error

  # RealtimeSanitizer job - detects real-time safety violations in audio code
  # Catches: allocations, mutex locks, blocking syscalls in processBlock()
  rtsan:
    name: RealtimeSanitizer
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure CMake with RTSan
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DOSCIL_ENABLE_RTSAN=ON \
            -DOSCIL_BUILD_TESTS=ON

      - name: Build with RTSan
        run: cmake --build build --config Debug --parallel 4

      - name: Run unit tests with RTSan
        run: ctest --test-dir build --build-config Debug --output-on-failure
        env:
          # RTSan will abort on first violation - we want to catch them
          RTSAN_OPTIONS: "halt_on_error=1"
