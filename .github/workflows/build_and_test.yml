name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            cmake_preset: ci-macos
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_macOS.zip
            pluginval_exe: pluginval.app/Contents/MacOS/pluginval
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

          - name: Windows
            os: windows-latest
            cmake_preset: ci-windows
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Windows.zip
            pluginval_exe: pluginval.exe
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

          - name: Linux
            os: ubuntu-22.04
            cmake_preset: ci-linux
            pluginval_url: https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip
            pluginval_exe: pluginval
            plugin_path: Oscil_artefacts/Release/VST3/oscil4.vst3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Install Ninja build system
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      # Setup ccache for faster rebuilds
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.name }}-${{ env.BUILD_TYPE }}
          max-size: 500M

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      # Configure CMake using presets
      - name: Configure CMake
        run: cmake --preset ${{ matrix.cmake_preset }}

      # Build using presets
      - name: Build
        run: cmake --build --preset ${{ matrix.cmake_preset }}

      # Run unit tests
      - name: Run Unit Tests
        run: ctest --preset ${{ matrix.cmake_preset }}

      # Download pluginval
      - name: Download pluginval
        shell: bash
        run: |
          curl -LO ${{ matrix.pluginval_url }}
          unzip pluginval_*.zip

      # Validate VST3 plugin with pluginval
      - name: Validate VST3 with pluginval
        shell: bash
        run: |
          ./${{ matrix.pluginval_exe }} --strictness-level 10 --verbose --validate "build/${{ matrix.cmake_preset }}/${{ matrix.plugin_path }}"

      # Upload build artifacts
      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-vst3-${{ matrix.name }}
          path: build/${{ matrix.cmake_preset }}/Oscil_artefacts/Release/VST3/
          if-no-files-found: error

      - name: Upload AU (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-au-${{ matrix.name }}
          path: build/${{ matrix.cmake_preset }}/Oscil_artefacts/Release/AU/
          if-no-files-found: error

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: oscil4-standalone-${{ matrix.name }}
          path: build/${{ matrix.cmake_preset }}/Oscil_artefacts/Release/Standalone/
          if-no-files-found: error

  # RealtimeSanitizer job - detects real-time safety violations in audio code
  # Catches: allocations, mutex locks, blocking syscalls in processBlock()
  # Note: Requires LLVM's official Clang 20+ (Ubuntu's packaged Clang doesn't include RTSan)
  rtsan:
    name: RealtimeSanitizer
    runs-on: ubuntu-24.04
    continue-on-error: true  # RTSan is experimental, don't block PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: rtsan-debug
          max-size: 500M

      - name: Install LLVM 20 (with RTSan support)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-20 lld-20

      - name: Install JUCE dependencies
        run: |
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Configure CMake with RTSan
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-20 \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DOSCIL_ENABLE_RTSAN=ON \
            -DOSCIL_BUILD_TESTS=ON

      - name: Build with RTSan
        run: cmake --build build --parallel

      - name: Run unit tests with RTSan
        run: ctest --test-dir build --build-config Debug --output-on-failure
        env:
          # RTSan will abort on first violation - we want to catch them
          RTSAN_OPTIONS: "halt_on_error=1"
